version: '3.8'

services:
  # PHP Application
  app:
    # หากต้องการ Build เองที่เครื่อง:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    # หากต้องการดึงจาก Docker Hub (ใช้ชื่อ image ที่คุณตั้ง):
    image: ${DOCKER_USERNAME:-yourusername}/hosinfo-app:${IMAGE_TAG:-latest}
    container_name: hosinfo-app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    volumes:
      - ./.env:/var/www/.env
      - ./storage:/var/www/storage
      - ./public/storage:/var/www/public/storage
      - public-build:/var/www/public
    networks:
      - hosinfo-network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: hosinfo-nginx
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - public-build:/var/www/public:ro
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    depends_on:
      - app
    networks:
      - hosinfo-network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: hosinfo-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    ports:
      - "33060:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - hosinfo-network

networks:
  hosinfo-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  public-build:
